<body>

    <!-- SIDEBAR (mesma) -->
    <aside class="sidebar">
        <div class="sidebar-logo"><img src="../../Images/logoFunada.png" /></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>Dashboard</span></a>
            <a href="chamados.html" class="nav-item active"><span class="nav-icon">📋</span><span>Chamados</span></a>
            <a href="usuario.html" class="nav-item"><span class="nav-icon">👥</span><span>Usuários</span></a>

            <div class="modal-actions">

                <button class="btn-submit" id="modal-submit">Enviar</button>

        </div>
    </div>
